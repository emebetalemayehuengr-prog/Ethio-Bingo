name: Deploy to HahuCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hahucloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      RUNTIME_API_BASE: ${{ secrets.RUNTIME_API_BASE }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_FRONTEND_PATH: ${{ secrets.SSH_FRONTEND_PATH }}
      SSH_BACKEND_PATH: ${{ secrets.SSH_BACKEND_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Override runtime API base (optional)
        if: ${{ env.RUNTIME_API_BASE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'window.__RUNTIME_CONFIG__ = { API_BASE: "%s" };\n' "$RUNTIME_API_BASE" > frontend/dist/runtime-config.js

      - name: Verify frontend build artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f frontend/dist/index.html
          test -f frontend/dist/.htaccess
          test -f frontend/dist/runtime-config.js

      - name: Install backend deps
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Validate backend app import
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from app.main import app
          assert app is not None
          print("Backend import ok")
          PY

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in SSH_HOST SSH_USER SSH_KEY SSH_FRONTEND_PATH SSH_BACKEND_PATH; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required deploy secrets: ${missing[*]}"
            exit 1
          fi

      - name: Upload frontend to HahuCloud (SFTP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "frontend/dist/*"
          target: ${{ secrets.SSH_FRONTEND_PATH }}
          timeout: 300000

      - name: Upload frontend SPA rewrite file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "frontend/dist/.htaccess"
          target: ${{ secrets.SSH_FRONTEND_PATH }}
          timeout: 300000

      - name: Upload backend to HahuCloud (SFTP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "backend/**"
          target: ${{ secrets.SSH_BACKEND_PATH }}
          overwrite: true
          strip_components: 1
          exclude: ".env,**/__pycache__/**,**/*.pyc,**/.venv/**,**/data/**,**/*.db"
          timeout: 300000

      - name: Restart backend app (Passenger)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || '22' }}
          timeout: 300000
          script_stop: true
          script: |
            set -e
            BACKEND_PATH="${{ env.SSH_BACKEND_PATH }}"
            if [ ! -d "$BACKEND_PATH" ]; then
              echo "Backend path not found: $BACKEND_PATH"
              exit 1
            fi
            mkdir -p "$BACKEND_PATH/tmp"
            touch "$BACKEND_PATH/tmp/restart.txt"
            test -f "$BACKEND_PATH/passenger_wsgi.py"
            test -f "$BACKEND_PATH/app/main.py"

      - name: Verify backend health endpoint
        if: ${{ env.RUNTIME_API_BASE != '' || env.VITE_API_BASE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          API_BASE="${RUNTIME_API_BASE:-$VITE_API_BASE}"
          API_BASE="${API_BASE%/}"
          case "$API_BASE" in
            */api) HEALTH_URL="$API_BASE/health" ;;
            *) HEALTH_URL="$API_BASE/api/health" ;;
          esac
          curl --fail --show-error --silent --retry 5 --retry-delay 5 "$HEALTH_URL"
