name: Deploy to HahuCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hahucloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      RUNTIME_API_BASE: ${{ secrets.RUNTIME_API_BASE }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY != '' && secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_FRONTEND_PATH: ${{ secrets.SSH_FRONTEND_PATH }}
      SSH_BACKEND_PATH: ${{ secrets.SSH_BACKEND_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Override runtime API base (optional)
        if: ${{ env.RUNTIME_API_BASE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'window.__RUNTIME_CONFIG__ = { API_BASE: "%s" };\n' "$RUNTIME_API_BASE" > frontend/dist/runtime-config.js

      - name: Verify frontend build artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f frontend/dist/index.html
          test -f frontend/dist/.htaccess
          test -f frontend/dist/runtime-config.js

      - name: Install backend deps
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Validate backend app import
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from app.main import app
          assert app is not None
          print("Backend import ok")
          PY

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in SSH_HOST SSH_USER SSH_KEY SSH_FRONTEND_PATH SSH_BACKEND_PATH; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required deploy secrets: ${missing[*]}"
            exit 1
          fi
          echo "SSH_PORT=${SSH_PORT:-22}" >> "$GITHUB_ENV"

      - name: Package frontend bundle
        shell: bash
        run: |
          set -euo pipefail
          tar -czf frontend-dist.tgz -C frontend/dist .

      - name: Package backend bundle
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='.env' \
            --exclude='.venv' \
            --exclude='data' \
            --exclude='*.db' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='*/__pycache__' \
            --exclude='*/__pycache__/*' \
            -czf backend-src.tgz \
            -C backend \
            .

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          timeout: 300000
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ env.SSH_FRONTEND_PATH }}"
            mkdir -p "${{ env.SSH_BACKEND_PATH }}"
            mkdir -p "${{ env.SSH_BACKEND_PATH }}/tmp"

      - name: Upload frontend to HahuCloud (SFTP)
        uses: appleboy/scp-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          source: "frontend-dist.tgz"
          target: ${{ env.SSH_FRONTEND_PATH }}
          overwrite: true
          timeout: 300000

      - name: Extract frontend bundle
        uses: appleboy/ssh-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          timeout: 300000
          script_stop: true
          script: |
            set -e
            FRONTEND_PATH="${{ env.SSH_FRONTEND_PATH }}"
            ARCHIVE="$FRONTEND_PATH/frontend-dist.tgz"
            if [ ! -f "$ARCHIVE" ]; then
              echo "Missing archive: $ARCHIVE"
              exit 1
            fi
            tar -xzf "$ARCHIVE" -C "$FRONTEND_PATH"
            rm -f "$ARCHIVE"
            test -f "$FRONTEND_PATH/index.html"
            test -f "$FRONTEND_PATH/.htaccess"

      - name: Upload backend to HahuCloud (SFTP)
        uses: appleboy/scp-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          target: ${{ env.SSH_BACKEND_PATH }}
          source: "backend-src.tgz"
          overwrite: true
          timeout: 300000

      - name: Extract backend bundle and restart Passenger
        uses: appleboy/ssh-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          timeout: 300000
          script_stop: true
          script: |
            set -e
            BACKEND_PATH="${{ env.SSH_BACKEND_PATH }}"
            ARCHIVE="$BACKEND_PATH/backend-src.tgz"
            if [ ! -f "$ARCHIVE" ]; then
              echo "Missing archive: $ARCHIVE"
              exit 1
            fi
            tar -xzf "$ARCHIVE" -C "$BACKEND_PATH"
            rm -f "$ARCHIVE"
            mkdir -p "$BACKEND_PATH/tmp"
            touch "$BACKEND_PATH/tmp/restart.txt"
            test -f "$BACKEND_PATH/passenger_wsgi.py"
            test -f "$BACKEND_PATH/app/main.py"

      - name: Verify backend health endpoint
        if: ${{ env.RUNTIME_API_BASE != '' || env.VITE_API_BASE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          API_BASE="${RUNTIME_API_BASE:-$VITE_API_BASE}"
          API_BASE="${API_BASE%/}"
          case "$API_BASE" in
            */api) HEALTH_URL="$API_BASE/health" ;;
            *) HEALTH_URL="$API_BASE/api/health" ;;
          esac
          curl --fail --show-error --silent --retry 5 --retry-delay 5 "$HEALTH_URL"
