name: Deploy to HahuCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hahucloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUNTIME_API_BASE: ${{ secrets.RUNTIME_API_BASE }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_FRONTEND_PATH: ${{ secrets.SSH_FRONTEND_PATH }}
      SSH_BACKEND_PATH: ${{ secrets.SSH_BACKEND_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Override runtime API base (optional)
        if: ${{ env.RUNTIME_API_BASE != '' }}
        run: |
          echo "window.__RUNTIME_CONFIG__ = { API_BASE: \"${{ env.RUNTIME_API_BASE }}\" };" > frontend/dist/runtime-config.js

      - name: Upload frontend to HahuCloud (SFTP)
        if: ${{ env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_KEY != '' && env.SSH_FRONTEND_PATH != '' }}
        uses: appleboy/scp-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          source: "frontend/dist/*"
          target: ${{ env.SSH_FRONTEND_PATH }}
          timeout: 300000

      - name: Upload backend to HahuCloud (SFTP)
        if: ${{ env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_KEY != '' && env.SSH_BACKEND_PATH != '' }}
        uses: appleboy/scp-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          source: "backend/**"
          target: ${{ env.SSH_BACKEND_PATH }}
          strip_components: 1
          overwrite: true
          exclude: ".env,**/__pycache__/**,**/*.pyc,**/.venv/**,**/data/**,**/*.db"
          timeout: 300000

      - name: Verify backend file updated (server)
        if: ${{ env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_KEY != '' && env.SSH_BACKEND_PATH != '' }}
        uses: appleboy/ssh-action@v1.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          timeout: 300000
          script: |
            set -e
            BACKEND_PATH="${{ env.SSH_BACKEND_PATH }}"
            FILE="$BACKEND_PATH/app/postgres_store.py"
            if [ ! -f "$FILE" ]; then
              echo "Missing file: $FILE"
              exit 1
            fi
            echo "File timestamp:"
            stat "$FILE" || true
            echo "Checking for ::numeric casts:"
            if ! grep -n "::numeric" "$FILE"; then
              echo "Expected ::numeric not found in $FILE"
              exit 1
            fi

      - name: Restart backend app (Passenger)
        if: ${{ env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_KEY != '' && env.SSH_BACKEND_PATH != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e
            BACKEND_PATH="${{ env.SSH_BACKEND_PATH }}"
            if [ ! -d "$BACKEND_PATH" ]; then
              echo "Backend path not found: $BACKEND_PATH"
              exit 1
            fi
            mkdir -p "$BACKEND_PATH/tmp"
            touch "$BACKEND_PATH/tmp/restart.txt"
