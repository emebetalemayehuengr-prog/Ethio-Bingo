name: Deploy to HahuCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hahucloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Override runtime API base (optional)
        if: ${{ secrets.RUNTIME_API_BASE != '' }}
        run: |
          echo "window.__RUNTIME_CONFIG__ = { API_BASE: \"${{ secrets.RUNTIME_API_BASE }}\" };" > frontend/dist/runtime-config.js

      - name: Upload frontend to HahuCloud (SFTP)
        if: ${{ secrets.SSH_HOST != '' && secrets.SSH_USER != '' && (secrets.SSH_PRIVATE_KEY != '' || secrets.SSH_KEY != '') && secrets.SSH_FRONTEND_PATH != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/dist/*"
          target: ${{ secrets.SSH_FRONTEND_PATH }}

      - name: Upload backend to HahuCloud (SFTP)
        if: ${{ secrets.SSH_HOST != '' && secrets.SSH_USER != '' && (secrets.SSH_PRIVATE_KEY != '' || secrets.SSH_KEY != '') && secrets.SSH_BACKEND_PATH != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "backend/**"
          target: ${{ secrets.SSH_BACKEND_PATH }}
          strip_components: 1
          overwrite: true
          exclude: ".env,**/__pycache__/**,**/*.pyc,**/.venv/**,**/data/**,**/*.db"

      - name: Restart backend app (Passenger)
        if: ${{ secrets.SSH_HOST != '' && secrets.SSH_USER != '' && (secrets.SSH_PRIVATE_KEY != '' || secrets.SSH_KEY != '') && secrets.SSH_BACKEND_PATH != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            BACKEND_PATH="${{ secrets.SSH_BACKEND_PATH }}"
            if [ ! -d "$BACKEND_PATH" ]; then
              echo "Backend path not found: $BACKEND_PATH"
              exit 1
            fi
            mkdir -p "$BACKEND_PATH/tmp"
            touch "$BACKEND_PATH/tmp/restart.txt"
