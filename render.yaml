services:
  - type: web
    name: 40bingo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: 40bingo-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: ENABLE_DEMO_SEED
        value: "false"
      - key: ENABLE_INTERNAL_TRANSFER
        value: "false"
      - key: SESSION_TTL_SECONDS
        value: "86400"
      - key: SIGNUP_INITIAL_MAIN_BALANCE
        value: "0"
      - key: SIGNUP_INITIAL_BONUS_BALANCE
        value: "0"
      - key: FORTY_BINGO_DB_PATH
        value: /var/data/40bingo.db
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_ALERT_EMAILS
        value: embetalemayehuengr@gmail.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://40bingo-frontend.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: a35000001@smtp-brevo.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: embetalemayehuengr@gmail.com
      - key: SMTP_USE_TLS
        value: "true"

  - type: web
    name: 40bingo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://40bingo-backend.onrender.com
